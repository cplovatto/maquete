<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Velo Retail</title>
    <meta name="description" content="Gestão de varejo de cosméticos — Loja e Venda Direta" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <script>
      try {
        const t = localStorage.getItem('velo-theme') ?? localStorage.getItem('prisma-theme');
        document.documentElement.setAttribute('data-theme',
          t || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
